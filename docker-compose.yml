services:
  app:
    build: ./app
    ports:
      - '3000:3000'
    environment:
      - MONGODB_URI=mongodb://mongo:27017
      - MONGODB_DB=cantine
    depends_on:
      - mongo

  mongo:
    image: mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
