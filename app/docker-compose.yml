services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      - MONGODB_URI=mongodb://mongo:27017
      - MONGODB_DB=cantine
      - BASIC_AUTH_USER=admin
      - BASIC_AUTH_PASSWORD=changeme
      - ADMIN_PIN=1234
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', 'db.adminCommand("ping").ok']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  mongo-data:
